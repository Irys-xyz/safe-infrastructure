---
# Install, start, stop, or restart the self-hosted Safe{Wallet} stack for Irys
# Mainnet (chain 3282) on a Debian host. The stack runs as a rootless podman
# systemd --user service (systemd/irys-safe.service), so this playbook drives
# `systemctl --user` as the unprivileged stack user via lingering + XDG_RUNTIME_DIR.
#
#   Install:  ansible-playbook -i inventory.ini irys-safe.yml -e @vars.yml
#   Start:    ansible-playbook -i inventory.ini irys-safe.yml -e @vars.yml -e irys_action=start
#   Stop:     ansible-playbook -i inventory.ini irys-safe.yml -e @vars.yml -e irys_action=stop
#   Restart:  ansible-playbook -i inventory.ini irys-safe.yml -e @vars.yml -e irys_action=restart
#   Status:   ansible-playbook -i inventory.ini irys-safe.yml -e @vars.yml -e irys_action=status
#
# See ansible/README.md for setup and ansible/vars.example.yml for the variables.

- name: Manage the Irys Safe{Wallet} stack
  hosts: irys
  become: true
  gather_facts: true

  vars:
    irys_action: install

    # Stack runtime config (defaults; override in vars.yml).
    irys_project_name: irys-safe-infrastructure
    irys_reverse_proxy_port: 8000
    irys_rpc_node_url: https://mainnet-beta-rpc.irys.xyz/v1/execution-rpc
    # Client Gateway path baked into the UI at build time. Default is the relative /cgw, so the UI
    # calls the same origin the page was served from (same-origin on the host's IP, hostname, or a
    # domain -- no CORS). Override in vars.yml with an absolute URL only for a Client Gateway on a
    # different origin; changing it triggers a one-off UI image rebuild + ui recreate on next deploy.
    irys_ui_gateway_url: /cgw
    irys_txs_version: latest
    irys_cfg_version: latest
    irys_cgw_version: latest
    irys_events_version: latest

    # Edge hardening toggles (see ansible/vars.example.yml). irys_safe_domain has no default
    # and is asserted at deploy time.
    irys_ssh_disable_passwords: true
    irys_install_fail2ban: true

    # Cloudflare Origin certificate paths on the host, and the IP allowlist for the web ports.
    irys_origin_cert_path: /etc/caddy/origin.crt
    irys_origin_key_path: /etc/caddy/origin.key
    irys_cloudflare_fetch_ips: true
    # Authenticated Origin Pulls (zone-level mTLS): Caddy requires Cloudflare's client cert.
    # Enable it in the Cloudflare dashboard BEFORE deploying, or the origin rejects everything.
    irys_cf_authenticated_origin_pull: true
    irys_cf_aop_ca_path: /etc/caddy/cloudflare-aop-ca.pem
    # Bundled Cloudflare ranges; refreshed from cloudflare.com at deploy when the toggle is on.
    cloudflare_ipv4:
      - 173.245.48.0/20
      - 103.21.244.0/22
      - 103.22.200.0/22
      - 103.31.4.0/22
      - 141.101.64.0/18
      - 108.162.192.0/18
      - 190.93.240.0/20
      - 188.114.96.0/20
      - 197.234.240.0/22
      - 198.41.128.0/17
      - 162.158.0.0/15
      - 104.16.0.0/13
      - 104.24.0.0/14
      - 172.64.0.0/13
      - 131.0.72.0/22
    cloudflare_ipv6:
      - 2400:cb00::/32
      - 2606:4700::/32
      - 2803:f800::/32
      - 2405:b500::/32
      - 2405:8100::/32
      - 2a06:98c0::/29
      - 2c0f:f248::/32

    # Rootless subordinate id range (only used if the user has none yet).
    subid_start: 100000
    subid_count: 65536

    # Local working copy pushed to the host (repo root = the Ansible dir's parent).
    irys_src_dir: "{{ playbook_dir | dirname }}"
    # Derived from the resolved stack user (lazy-evaluated once stack_* are set).
    irys_dir: "{{ stack_home }}/irys-safe-infrastructure"
    xdg_env:
      XDG_RUNTIME_DIR: "/run/user/{{ stack_uid }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ stack_uid }}/bus"

    apt_packages:
      - podman
      - podman-compose
      - podman-docker
      - uidmap
      - dbus-user-session
      - slirp4netns
      - passt
      # netavark is the network backend; aardvark-dns is its DNS server. Without aardvark-dns
      # rootless containers get networking but no name resolution, so every service-to-service
      # lookup (cgw->cgw-redis, nginx->upstreams, txs->txs-db) fails with EAI_AGAIN. Debian
      # ships aardvark-dns only as a Recommends, so a minimal podman install omits it.
      - netavark
      - aardvark-dns
      - fuse-overlayfs
      - rsync
      - curl
      - acl
      # Edge hardening: TLS reverse proxy (Caddy), host firewall (nftables), and an SSH
      # brute-force backstop (fail2ban). nftables ships on Debian but is listed for clarity.
      - caddy
      - nftables
      - fail2ban
      # pipx installs a modern podman-compose (1.5.0) into the stack user's ~/.local/bin.
      # The apt podman-compose (1.3.0) recreates the whole project on `up --no-deps`, which
      # breaks the tiered bring-up: starting nginx (last tier) tears the running stack down.
      - pipx

  pre_tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - irys_action in ['install', 'start', 'stop', 'restart', 'status']
          - stack_user is defined and stack_user | length > 0
        fail_msg: >-
          Set stack_user. irys_action must be one of install, start, stop,
          restart, status.

  tasks:
    # --- install: system preparation (root) -------------------------------
    - name: System preparation
      when: irys_action == 'install'
      block:
        - name: Install the official Caddy apt signing key
          ansible.builtin.get_url:
            url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
            dest: /usr/share/keyrings/caddy-stable-archive-keyring.asc
            mode: "0644"

        # Debian ships Caddy 2.6.2, which predates the trusted_proxies/client_ip_headers and
        # trust_pool (mTLS) Caddyfile syntax used below. The official repo provides a current,
        # maintained Caddy.
        - name: Add the official Caddy apt repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
            filename: caddy-stable
            state: present

        - name: Install host packages
          ansible.builtin.apt:
            name: "{{ apt_packages }}"
            state: present
            update_cache: true
            cache_valid_time: 3600

        # Fresh Debian ships registries.conf with unqualified-search-registries
        # commented out, so podman cannot resolve the short image names the compose
        # file uses (postgres:14-alpine, redis:alpine, safeglobal/...). Point them at
        # Docker Hub via a non-destructive drop-in.
        - name: Resolve unqualified (short-name) images to Docker Hub
          ansible.builtin.copy:
            dest: /etc/containers/registries.conf.d/99-irys-unqualified-search.conf
            content: |
              # Managed by ansible (irys-safe.yml).
              unqualified-search-registries = ["docker.io"]
            owner: root
            group: root
            mode: "0644"

        # The UI `next build` needs ~8 GiB heap; on a host with < ~16 GiB RAM it OOMs
        # ("JavaScript heap out of memory"). Back it with swap so the build (heap raised via
        # NODE_OPTIONS in docker/ui-irys.Dockerfile) is not cut short by a system OOM.
        - name: Ensure 8 GiB swap on RAM-constrained hosts (UI build OOMs without it)
          when: ansible_memtotal_mb | int < 15000
          block:
            - name: Create the swapfile
              ansible.builtin.command: fallocate -l 8G /swapfile
              args:
                creates: /swapfile
              register: swapfile

            - name: Format, secure, and activate a freshly created swapfile
              when: swapfile is changed
              block:
                - name: Secure the swapfile
                  ansible.builtin.file:
                    path: /swapfile
                    mode: "0600"
                - name: Make it a swap area
                  ansible.builtin.command: mkswap /swapfile
                - name: Activate the swap
                  ansible.builtin.command: swapon /swapfile

            - name: Persist the swapfile in fstab
              ansible.builtin.lineinfile:
                path: /etc/fstab
                line: "/swapfile none swap sw 0 0"
                regexp: '^/swapfile\s'
                create: true

        - name: Ensure the unprivileged stack user exists
          ansible.builtin.user:
            name: "{{ stack_user }}"
            create_home: true
            shell: /bin/bash

        - name: Enable lingering so the user service starts at boot
          ansible.builtin.command: "loginctl enable-linger {{ stack_user }}"
          args:
            creates: "/var/lib/systemd/linger/{{ stack_user }}"

    # --- resolve the stack user (all actions) -----------------------------
    - name: Read the stack user from passwd
      ansible.builtin.getent:
        database: passwd
        key: "{{ stack_user }}"

    - name: Set uid / home facts
      ansible.builtin.set_fact:
        stack_uid: "{{ getent_passwd[stack_user][1] }}"
        stack_home: "{{ getent_passwd[stack_user][4] }}"

    - name: Ensure the user systemd manager is running
      ansible.builtin.systemd_service:
        name: "user@{{ stack_uid }}.service"
        state: started
      # System scope (root): brings up /run/user/<uid> and its DBus socket.

    # --- install: rootless prep, code, unit, first start ------------------
    - name: Deploy and enable the stack
      when: irys_action == 'install'
      block:
        - name: Ensure rootless subuid range
          ansible.builtin.lineinfile:
            path: /etc/subuid
            regexp: "^{{ stack_user }}:"
            line: "{{ stack_user }}:{{ subid_start }}:{{ subid_count }}"
            create: true
            owner: root
            group: root
            mode: "0644"
          register: subuid

        - name: Ensure rootless subgid range
          ansible.builtin.lineinfile:
            path: /etc/subgid
            regexp: "^{{ stack_user }}:"
            line: "{{ stack_user }}:{{ subid_start }}:{{ subid_count }}"
            create: true
            owner: root
            group: root
            mode: "0644"
          register: subgid

        - name: Migrate podman storage after an id-range change
          ansible.builtin.command: podman system migrate
          become: true
          become_user: "{{ stack_user }}"
          environment: "{{ xdg_env }}"
          when: subuid is changed or subgid is changed
          changed_when: true

        # The unit's PATH prefers ~/.local/bin, so this 1.5.0 launcher shadows the apt 1.3.0
        # (whose `up --no-deps` recreates the whole project and breaks the tiered bring-up).
        - name: Install podman-compose 1.5.0 for the stack user (apt 1.3.0 breaks `up --no-deps`)
          ansible.builtin.command: pipx install 'podman-compose==1.5.0'
          args:
            creates: "{{ stack_home }}/.local/bin/podman-compose"
          become: true
          become_user: "{{ stack_user }}"
          environment:
            HOME: "{{ stack_home }}"
            PATH: "{{ stack_home }}/.local/bin:/usr/local/bin:/usr/bin:/bin"

        - name: Sync the working copy to the host (rsync)
          ansible.posix.synchronize:
            src: "{{ irys_src_dir }}/"
            dest: "{{ irys_dir }}/"
            archive: true
            owner: false
            group: false
            delete: false
            rsync_opts:
              - "--exclude=.git"
              - "--exclude=data"
              - "--exclude=.env"
              - "--exclude=claude"
              - "--exclude=.idea"
              - "--exclude=ansible/inventory.ini"
              - "--exclude=ansible/vars.yml"
              # Per-service secrets are gitignored and provisioned out-of-band; the *.env.example
              # templates still sync. Place container_env_files/*.env on a fresh host before start.
              - "--exclude=container_env_files/*.env"
          become: false
          notify: Restart irys-safe stack

        # Re-own the rsynced code tree to the stack user, but never recurse into ./data.
        # The postgres subdirs there are chowned to container uid 70 (mapped through the
        # rootless userns); a blanket `chown -R {{ irys_dir }}` would re-map them to the stack
        # user (= container root), postgres would lose access to its own files, and every *-db
        # container would crash-loop on the next install. rsync already excludes ./data, so
        # podman alone owns what lives under it -- prune it from the chown.
        - name: Ensure the deployed tree (excluding ./data) is owned by the stack user
          ansible.builtin.command:
            argv:
              - find
              - "{{ irys_dir }}"
              - -path
              - "{{ irys_dir }}/data"
              - -prune
              - -o
              - -exec
              - chown
              - "{{ stack_user }}:{{ stack_user }}"
              - "{}"
              - +
          become: true
          changed_when: true

        - name: Render the repo-root .env
          ansible.builtin.template:
            src: env.j2
            dest: "{{ irys_dir }}/.env"
            owner: "{{ stack_user }}"
            group: "{{ stack_user }}"
            mode: "0600"

        - name: Ensure the user unit directory exists
          ansible.builtin.file:
            path: "{{ stack_home }}/.config/systemd/user"
            state: directory
            owner: "{{ stack_user }}"
            group: "{{ stack_user }}"
            mode: "0755"

        - name: Install the systemd user unit
          ansible.builtin.template:
            src: irys-safe.service.j2
            dest: "{{ stack_home }}/.config/systemd/user/irys-safe.service"
            owner: "{{ stack_user }}"
            group: "{{ stack_user }}"
            mode: "0644"

        - name: Stat the per-service secret files (not synced — must exist on the host)
          ansible.builtin.stat:
            path: "{{ irys_dir }}/container_env_files/{{ item }}"
          loop:
            - cfg.env
            - cgw.env
            - txs.env
            - events.env
            - ui.env
          register: irys_env_files

        - name: Fail clearly if any per-service secret file is missing
          ansible.builtin.assert:
            that: >-
              (irys_env_files.results | selectattr('stat.exists') | list | length)
              == (irys_env_files.results | length)
            fail_msg: >-
              container_env_files/*.env are gitignored and no longer synced by this playbook.
              Provision them on the host first — copy each container_env_files/*.env.example to
              *.env and fill the __CHANGE_ME__ / __PASSWORD__ placeholders — then re-run.

        - name: Enable and start the stack (first run pulls images + builds the UI)
          ansible.builtin.systemd_service:
            name: irys-safe.service
            scope: user
            enabled: true
            state: started
            daemon_reload: true
          become: true
          become_user: "{{ stack_user }}"
          environment: "{{ xdg_env }}"

    # --- install: edge hardening (TLS proxy, firewall, SSH) ---------------
    - name: Edge hardening (Caddy TLS, nftables firewall, SSH)
      when: irys_action == 'install'
      block:
        - name: Require a domain and a Cloudflare Origin certificate
          ansible.builtin.assert:
            that:
              - irys_safe_domain is defined and irys_safe_domain | length > 0
              - irys_origin_cert is defined and irys_origin_cert | length > 0
              - irys_origin_key is defined and irys_origin_key | length > 0
            fail_msg: >-
              Set irys_safe_domain and provide irys_origin_cert / irys_origin_key (the Cloudflare
              Origin Certificate PEM and key, vaulted). Generate them in Cloudflare: SSL/TLS ->
              Origin Server -> Create Certificate. See ansible/vars.example.yml.

        - name: Install the Cloudflare Origin certificate
          ansible.builtin.copy:
            content: "{{ irys_origin_cert }}"
            dest: "{{ irys_origin_cert_path }}"
            owner: root
            group: caddy
            mode: "0644"
          notify: Reload caddy

        - name: Install the Cloudflare Origin private key
          ansible.builtin.copy:
            content: "{{ irys_origin_key }}"
            dest: "{{ irys_origin_key_path }}"
            owner: root
            group: caddy
            mode: "0640"
          no_log: true
          notify: Reload caddy

        - name: Install the Cloudflare Authenticated-Origin-Pull CA certificate
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/files/cloudflare-aop-ca.pem"
            dest: "{{ irys_cf_aop_ca_path }}"
            owner: root
            group: caddy
            mode: "0644"
          when: irys_cf_authenticated_origin_pull | default(true)
          notify: Reload caddy

        - name: Install the Caddy reverse-proxy config
          ansible.builtin.template:
            src: Caddyfile.j2
            dest: /etc/caddy/Caddyfile
            owner: root
            group: root
            mode: "0644"
            validate: caddy validate --adapter caddyfile --config %s
          notify: Reload caddy

        - name: Enable and start Caddy
          ansible.builtin.systemd_service:
            name: caddy
            enabled: true
            state: started

        - name: Refresh Cloudflare IP ranges (best-effort; falls back to the bundled defaults)
          when: irys_cloudflare_fetch_ips | default(true)
          block:
            - name: Fetch Cloudflare IPv4 ranges
              ansible.builtin.uri:
                url: https://www.cloudflare.com/ips-v4
                return_content: true
              register: cf_v4
              failed_when: false
              changed_when: false

            - name: Fetch Cloudflare IPv6 ranges
              ansible.builtin.uri:
                url: https://www.cloudflare.com/ips-v6
                return_content: true
              register: cf_v6
              failed_when: false
              changed_when: false

            - name: Use the fetched ranges when both fetches succeed
              ansible.builtin.set_fact:
                cloudflare_ipv4: "{{ cf_v4.content.split() }}"
                cloudflare_ipv6: "{{ cf_v6.content.split() }}"
              when:
                - cf_v4.status | default(0) == 200
                - cf_v6.status | default(0) == 200
                - cf_v4.content | default('') | length > 0
                - cf_v6.content | default('') | length > 0

        - name: Install the nftables host firewall (web ports limited to Cloudflare)
          ansible.builtin.template:
            src: nftables.conf.j2
            dest: /etc/nftables.conf
            owner: root
            group: root
            mode: "0755"
            validate: nft -c -f %s
          notify: Reload nftables

        - name: Enable and start nftables
          ansible.builtin.systemd_service:
            name: nftables
            enabled: true
            state: started

        - name: Harden sshd (key-only authentication)
          ansible.builtin.template:
            src: sshd-hardening.conf.j2
            dest: /etc/ssh/sshd_config.d/10-irys-hardening.conf
            owner: root
            group: root
            mode: "0644"
          when: irys_ssh_disable_passwords | default(true)
          notify: Reload sshd

        - name: Validate the merged sshd config (the play aborts before reload if it is broken)
          ansible.builtin.command: sshd -t
          changed_when: false
          when: irys_ssh_disable_passwords | default(true)

        - name: Configure the fail2ban sshd jail
          ansible.builtin.template:
            src: jail.local.j2
            dest: /etc/fail2ban/jail.local
            owner: root
            group: root
            mode: "0644"
          when: irys_install_fail2ban | default(true)
          notify: Restart fail2ban

        - name: Enable and start fail2ban
          ansible.builtin.systemd_service:
            name: fail2ban
            enabled: true
            state: started
          when: irys_install_fail2ban | default(true)

    # --- install: enforce Config/Gateway security settings on the host env -
    # The per-service *.env are provisioned out-of-band (gitignored), so these tasks converge
    # the security-critical keys on top of whatever was provisioned -- a deploy fixes the
    # running host without hand edits. Secrets (SECRET_KEY, AUTH_TOKEN, passwords) are left to
    # the operator / vault; only non-secret hardening settings are enforced here.
    - name: Harden the Config and Client-Gateway service env
      when: irys_action == 'install'
      vars:
        cfg_env: "{{ irys_dir }}/container_env_files/cfg.env"
        cgw_env: "{{ irys_dir }}/container_env_files/cgw.env"
      block:
        - name: Config Service — disable DEBUG, scope ALLOWED_HOSTS and origins
          ansible.builtin.lineinfile:
            path: "{{ cfg_env }}"
            regexp: "{{ item.regexp }}"
            line: "{{ item.line }}"
          loop:
            - { regexp: '^DEBUG=', line: 'DEBUG=false' }
            - { regexp: '^ROOT_LOG_LEVEL=', line: 'ROOT_LOG_LEVEL=INFO' }
            - { regexp: '^DJANGO_ALLOWED_HOSTS=', line: 'DJANGO_ALLOWED_HOSTS="{{ irys_safe_domain }},nginx,localhost,127.0.0.1"' }
            # http://localhost:8000 keeps the SSH-tunnel admin (Caddy 403s it publicly) usable.
            - { regexp: '^CSRF_TRUSTED_ORIGINS=', line: 'CSRF_TRUSTED_ORIGINS="https://{{ irys_safe_domain }},http://localhost:8000"' }
            - { regexp: '^MEDIA_URL', line: 'MEDIA_URL = "https://{{ irys_safe_domain }}/cfg/media/"' }
          loop_control:
            label: "{{ item.line }}"
          notify: Restart irys-safe stack

        - name: Client Gateway — point the post-login redirect at the real origin
          ansible.builtin.lineinfile:
            path: "{{ cgw_env }}"
            regexp: '^AUTH_POST_LOGIN_REDIRECT_URI='
            line: 'AUTH_POST_LOGIN_REDIRECT_URI=https://{{ irys_safe_domain }}'
          notify: Restart irys-safe stack

        - name: Client Gateway — set a strong JWT secret when one is provided
          ansible.builtin.lineinfile:
            path: "{{ cgw_env }}"
            regexp: '^JWT_SECRET='
            line: "JWT_SECRET={{ irys_cgw_jwt_secret }}"
          when: irys_cgw_jwt_secret is defined and irys_cgw_jwt_secret | length > 0
          no_log: true
          notify: Restart irys-safe stack

    # --- start / stop / restart -------------------------------------------
    - name: "Run lifecycle action {{ irys_action }}"
      when: irys_action in ['start', 'stop', 'restart']
      ansible.builtin.systemd_service:
        name: irys-safe.service
        scope: user
        state: "{{ {'start': 'started', 'stop': 'stopped', 'restart': 'restarted'}[irys_action] }}"
      become: true
      become_user: "{{ stack_user }}"
      environment: "{{ xdg_env }}"

    # --- status (read-only) -----------------------------------------------
    - name: Report stack status
      when: irys_action == 'status'
      block:
        - name: Query the service unit state
          ansible.builtin.systemd_service:
            name: irys-safe.service
            scope: user
          become: true
          become_user: "{{ stack_user }}"
          environment: "{{ xdg_env }}"
          register: irys_unit
          changed_when: false
          failed_when: false

        - name: Show service state
          ansible.builtin.debug:
            msg: >-
              irys-safe.service —
              active: {{ (irys_unit.status | default({})).get('ActiveState', 'unknown') }}
              / sub: {{ (irys_unit.status | default({})).get('SubState', 'unknown') }}
              / enabled: {{ (irys_unit.status | default({})).get('UnitFileState', 'unknown') }}

        - name: Check the reverse-proxy endpoints (RUNBOOK section 9)
          ansible.builtin.uri:
            url: "http://localhost:{{ irys_reverse_proxy_port }}{{ item }}"
            method: GET
            timeout: 10
          loop:
            - /cfg/api/v1/about/
            - /txs/api/v1/about/
            - /cgw/about
            - /
          register: irys_endpoints
          changed_when: false
          failed_when: false

        - name: Show reverse-proxy endpoint status
          ansible.builtin.debug:
            msg: "{{ item.status | default('ERR') }}  {{ item.item }}"
          loop: "{{ irys_endpoints.results }}"
          loop_control:
            label: "{{ item.item }}"

  handlers:
    - name: Reload caddy
      ansible.builtin.systemd_service:
        name: caddy
        state: reloaded

    - name: Reload nftables
      ansible.builtin.systemd_service:
        name: nftables
        state: reloaded

    - name: Reload sshd
      ansible.builtin.systemd_service:
        name: ssh
        state: reloaded

    - name: Restart fail2ban
      ansible.builtin.systemd_service:
        name: fail2ban
        state: restarted

    # The stack reads its env at container start, so config changes (hardened env, new
    # compose port bindings) only take effect on a restart. Runs as the rootless stack user.
    - name: Restart irys-safe stack
      ansible.builtin.systemd_service:
        name: irys-safe.service
        scope: user
        state: restarted
      become: true
      become_user: "{{ stack_user }}"
      environment: "{{ xdg_env }}"
