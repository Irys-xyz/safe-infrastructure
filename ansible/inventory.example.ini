# Copy to inventory.ini and edit. For the rsync deploy, connect as the runtime user
# (ansible_user = stack_user) so the synced tree is writable by the stack; that user
# needs sudo for the privileged install steps (apt, user, linger, subuid).

[irys]
elbereth ansible_host=elbereth.example.net ansible_user=irys

[irys:vars]
ansible_python_interpreter=/usr/bin/python3
